#cloud-config
package_update: true
package_upgrade: true

bootcmd:
  - mkdir -p /opt/shardup-judge /etc/caddy

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - nodejs
  - npm
  - ufw

write_files:
  - path: /opt/shardup-judge/docker-compose.yaml
    permissions: "0644"
    content: |
      services:
        api:
          image: ghcr.io/engineer-man/piston
          container_name: piston_api
          restart: always
          privileged: true
          ports:
            - "127.0.0.1:2000:2000"
          volumes:
            - ./data/piston/packages:/piston/packages
          tmpfs:
            - /tmp:exec

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    content: |
      {
        email __LETSENCRYPT_EMAIL__
      }

      __JUDGE_DOMAIN__ {
        @authorized header Authorization "Bearer __JUDGE_API_KEY__"
        handle @authorized {
          reverse_proxy 127.0.0.1:2000
        }

        respond "Unauthorized" 401
      }

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" > /etc/apt/sources.list.d/docker.list
  - curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key -o /etc/apt/keyrings/caddy.asc
  - chmod a+r /etc/apt/keyrings/caddy.asc
  - echo "deb [signed-by=/etc/apt/keyrings/caddy.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main" > /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin caddy
  - usermod -aG docker ubuntu
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - cd /opt/shardup-judge && docker compose up -d
  - git clone https://github.com/engineer-man/piston.git /opt/piston-src
  - cd /opt/piston-src/cli && npm ci
  - until curl -fsS http://127.0.0.1:2000/api/v2/runtimes >/dev/null; do sleep 2; done
  - node /opt/piston-src/cli/index.js -u http://127.0.0.1:2000 ppman install python=3.10.0
  - node /opt/piston-src/cli/index.js -u http://127.0.0.1:2000 ppman install gcc=10.2.0
  - caddy validate --config /etc/caddy/Caddyfile
  - systemctl enable --now caddy
  - systemctl reload caddy
  - curl -fsS http://127.0.0.1:2000/api/v2/runtimes | jq '.[] | select(.language == "python" or .language == "c++")'
